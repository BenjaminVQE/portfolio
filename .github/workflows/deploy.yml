name: Deploy to VPS

on:
  workflow_run:
    workflows: ["Build Image and Push Registry"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    env:
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_IP: ${{ secrets.VPS_IP }}
      REGISTRY_NAME: ${{ secrets.REGISTRY_NAME }}

    steps:
      - name: Setup SSH for VPS
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_IP" >> ~/.ssh/known_hosts

      - name: SSH into VPS and deploy
        run: |
          ssh "$VPS_USER@$VPS_IP" << EOF
            set -e
            echo "--Start Pulling image--"
            docker pull $REGISTRY_NAME/portfolio
            echo "--End Pulling image--"
            docker stop portfolio-container || true
            docker rm portfolio-container || true
            echo "--Running container--"
            docker run -p 3000:80 --name portfolio-container -d $REGISTRY_NAME/portfolio
          EOF
